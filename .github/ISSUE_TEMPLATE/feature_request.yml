name: Feature request
description: Propose a focused improvement or new use case
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to accomplish, and what blocks you today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the desired behavior rather than only the implementation.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other tools have you tried?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, compatibility constraints, or related projects.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find the same request.
          required: true
        - label: This request fits USB LinkMic's macOS + Android device-linking scope.
          required: true
