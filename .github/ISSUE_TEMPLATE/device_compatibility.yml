name: Device compatibility report
description: Report whether USB networking works on a specific Android device or ROM
title: "[Compatibility]: "
labels:
  - compatibility
body:
  - type: dropdown
    id: direction
    attributes:
      label: Network direction
      options:
        - Phone network to Mac (CDC-NCM)
        - Mac network to phone (ADB + VPN)
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: Result
      options:
        - Works
        - Partially works
        - Does not work
    validations:
      required: true
  - type: input
    id: phone
    attributes:
      label: Phone manufacturer and model
      placeholder: Google Pixel 10
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android version and ROM/build
      placeholder: Android 16, stock build ...
    validations:
      required: true
  - type: input
    id: mac
    attributes:
      label: Mac and macOS version
      placeholder: MacBook Air M4, macOS 26.0
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Test details
      description: Describe the USB function, connection state, IP/router state, VPN behavior, and any workaround.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      render: shell
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy
      options:
        - label: I removed serial numbers, public IP addresses, secrets, and other personal data.
          required: true
