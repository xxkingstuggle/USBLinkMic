name: Bug report
description: 报告可以稳定复现的错误 / Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈。安全漏洞请不要填写公开 Issue，请使用仓库 Security 页面私下报告。提交日志前请删除设备序列号、用户名、IP 和本地路径。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前检查
      options:
        - label: 我已搜索现有 Issue，并确认没有重复报告。
          required: true
        - label: 我已阅读故障排查文档，并使用当前 main 或最新 Release 复现。
          required: true

  - type: dropdown
    id: area
    attributes:
      label: 功能区域
      options:
        - 手机麦克风给 Mac
        - 手机网络给 Mac
        - Mac 网络给手机
        - Android 界面/权限/启动
        - macOS 界面/音频输出
        - 构建或发布包
        - 其他
    validations:
      required: true

  - type: input
    id: versions
    attributes:
      label: 版本与提交
      description: Mac App、Android App、Release 或 commit SHA。
      placeholder: "macOS 3.0.0, Android 3.0.0, commit 09738fc"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 环境
      description: Mac 型号/macOS、Android 型号/ROM/版本、USB 或 Wi-Fi、ADB 版本。
      placeholder: |
        Mac: Apple Silicon, macOS 26.x
        Phone: model, Android version, ROM
        Connection: USB ADB / Wi-Fi TCP
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 连接……
        2. 打开……
        3. 点击……
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为与已脱敏日志
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充截图或信息
      description: 可拖入截图；不要上传含敏感信息的完整系统日志。
