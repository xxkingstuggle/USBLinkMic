name: Bug report
description: Report a reproducible problem in USB LinkMic
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Remove secrets and personal information from logs before attaching them.
  - type: dropdown
    id: feature
    attributes:
      label: Affected feature
      options:
        - Phone microphone to Mac (ADB)
        - Phone microphone to Mac (Wi-Fi TCP)
        - Phone network to Mac (USB CDC-NCM)
        - Mac network to phone (ADB + VPN)
        - macOS app UI or lifecycle
        - Android app UI or lifecycle
        - Build or packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the observed behavior and what you expected instead.
      placeholder: "Observed: ...\nExpected: ..."
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Connect ...
        2. Enable ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: USB LinkMic version
      placeholder: v3.0.0 or commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include Mac model/architecture, macOS version, phone model, Android version, ROM/vendor, and ADB version.
      placeholder: |
        Mac: MacBook Pro (Apple silicon), macOS ...
        Phone: ..., Android ..., ROM/vendor ...
        adb version: ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant, sanitized Mac/Android logs. Use a code block or attach a text file.
      render: shell
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add screenshots, USB function state, network topology, or anything else that may help.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed secrets, personal data, and device identifiers from logs.
          required: true
