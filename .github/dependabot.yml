version: 2

updates:
  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      androidx:
        patterns:
          - "androidx.*"
        update-types:
          - minor
          - patch
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
        update-types:
          - minor
          - patch
      protobuf:
        patterns:
          - "com.google.protobuf*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      # Core 1.19 and Lifecycle 2.11 require compileSdk 37 and AGP 9.1.
      # Keep them pinned until the project performs that migration as one
      # deliberate, device-tested change.
      - dependency-name: "androidx.core:core-ktx"
        versions:
          - ">= 1.19.0"
      - dependency-name: "androidx.lifecycle:*"
        versions:
          - ">= 2.11.0"
      # Kotlin 2.3+ is a compiler/toolchain migration, not a routine library
      # update. Keep Kotlin and the Compose compiler paired on 2.2.x until the
      # migration is tested separately.
      - dependency-name: "org.jetbrains.kotlin.android"
        versions:
          - ">= 2.3.0"
      - dependency-name: "org.jetbrains.kotlin.plugin.compose"
        versions:
          - ">= 2.3.0"
      # Coroutines 1.11 changes the Android test dependency graph. Upgrade it
      # together with the Kotlin migration instead of mixing the two changes.
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-coroutines-test"
        versions:
          - ">= 1.11.0"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
