version: 2

updates:
  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: monday
      time: "03:00"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      androidx:
        patterns:
          - "androidx.*"
        update-types:
          - minor
          - patch
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
        update-types:
          - minor
          - patch
      protobuf:
        patterns:
          - "com.google.protobuf*"
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "03:30"
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
